<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Portata"/>
<title>Prove di Portata</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;
  --text:#1a1a18;--text2:#6b6b66;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --blue:#378ADD;--green:#1D9E75;--orange:#D85A30;--red:#E24B4A;
  --amb:#faeeda;--ambt:#854f0b;
  --r:10px;--rs:7px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;
  --text:#f0efea;--text2:#a0a09a;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2)
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#root{max-width:640px;margin:0 auto;padding-bottom:3rem}
input,button{font-family:inherit;font-size:16px;outline:none}
input{-webkit-appearance:none;appearance:none;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);width:100%;transition:border-color .15s}
input:focus{border-color:var(--blue);background:var(--bg)}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
button{cursor:pointer;border-radius:var(--rs);border:.5px solid var(--border2);background:var(--bg2);color:var(--text);padding:9px 18px}
button:active{opacity:.75}
button:disabled{opacity:.4;cursor:not-allowed}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:12px}
.lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block}
.mc{background:var(--bg2);border-radius:var(--rs);padding:10px 12px}
.mv{font-size:22px;font-weight:500;line-height:1.1}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bp{background:var(--blue)!important;color:#fff!important;border:none!important;font-weight:500}
.bg{background:var(--green)!important;color:#fff!important;border:none!important;font-weight:500}
.bo{background:var(--orange)!important;color:#fff!important;border:none!important;font-weight:500}
.timer{font-size:42px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-2px;line-height:1}
.notif{position:sticky;top:0;z-index:20;padding:10px 16px;font-size:13px}
.ni{background:#e6f1fb;color:#185fa5;border-bottom:.5px solid #b5d4f4}
.no{background:#eaf3de;color:#3b6d11;border-bottom:.5px solid #c0dd97}
.ne{background:#fcebeb;color:#a32d2d;border-bottom:.5px solid #f7c1c1}
.pbar{display:flex;gap:4px;margin-bottom:8px}
.pbar div{flex:1;height:3px;border-radius:2px;background:var(--border)}
.snav{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.sp{flex-shrink:0;padding:6px 14px;border-radius:var(--rs);font-size:12px;font-weight:500;white-space:nowrap}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-weight:400;color:var(--text2);padding:3px 0}
td{padding:5px 0;border-top:.5px solid var(--border)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--bg);border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-height:80vh;display:flex;flex-direction:column;gap:12px}
.modal textarea{flex:1;min-height:180px;font-family:"Courier New",monospace;font-size:11px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rs);padding:10px;color:var(--text);resize:none}
</style>
</head>
<body>
<div id="root"><p style="padding:2rem;color:#888">Caricamento…</p></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3/dist/htm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const {useState,useEffect,useRef,useCallback} = React;
const html = htm.bind(React.createElement);
const COLORS = ["#378ADD","#1D9E75","#D85A30","#7F77DD","#BA7517","#D4537E","#639922","#E24B4A"];
const PH = {S:"setup",D:"down",R:"rec",X:"res"};
const fmt = s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const DB = {
  K:"pump_v3",
  save(d){try{localStorage.setItem(DB.K,JSON.stringify(d))}catch{}},
  load(){try{const r=localStorage.getItem(DB.K);return r?JSON.parse(r):null}catch{return null}},
  clear(){try{localStorage.removeItem(DB.K)}catch{}}
};

/* ── tiny helpers ── */
function Lbl({children}){ return html`<span className="lbl">${children}</span>`; }
function Card({children,style}){ return html`<div className="card" style=${style||{}}>${children}</div>`; }
function MC({label,value,sub,color}){
  return html`<div className="mc">
    <span className="lbl">${label}</span>
    <div className="mv" style=${{color:color||"var(--text)"}}>${value}</div>
    ${sub&&html`<div style=${{fontSize:11,color:"var(--text2)",marginTop:2}}>${sub}</div>`}
  </div>`;
}

/* ── main app ── */
function App(){
  const [ph,setPh]=useState(PH.S);
  const [well,setWell]=useState({name:"",lat:"",lon:"",alt:"",ls:""});
  const [gL,setGL]=useState(false);
  const [gE,setGE]=useState("");
  const [cfg,setCfg]=useState([{n:1,q:""},{n:2,q:""},{n:3,q:""}]);
  const [steps,setSteps]=useState([]);
  const [idx,setIdx]=useState(0);
  const [rec,setRec]=useState([]);
  const [recQ,setRecQ]=useState(0);
  const [tsec,setTsec]=useState(0);
  const [trun,setTrun]=useState(false);
  const [sv,setSv]=useState("");
  const [rv,setRv]=useState("");
  const [toast,setToast]=useState(null);
  const [restored,setRestored]=useState(false);
  const [chartOk,setChartOk]=useState(false);
  const [csvModal,setCsvModal]=useState(null);
  const tref=useRef(null);
  const cref=useRef(null);
  const cinst=useRef(null);
  const sinp=useRef(null);

  const T=(msg,t="i")=>{setToast({msg,t});setTimeout(()=>setToast(null),2500)};

  // restore
  useEffect(()=>{
    const d=DB.load();
    if(!d||d.ph===PH.S)return;
    setWell(d.well||{});setCfg(d.cfg||[]);setSteps(d.steps||[]);
    setIdx(d.idx??0);setRec(d.rec||[]);setRecQ(d.recQ||0);
    setTsec(d.tsec||0);setPh(d.ph);setRestored(true);
  },[]);

  // timer
  useEffect(()=>{
    if(trun){tref.current=setInterval(()=>setTsec(s=>s+1),1000);}
    else clearInterval(tref.current);
    return()=>clearInterval(tref.current);
  },[trun]);

  // chart
  useEffect(()=>{if(ph===PH.X&&!chartOk)setTimeout(()=>setChartOk(true),400);},[ph,chartOk]);
  useEffect(()=>{
    if(!chartOk||ph!==PH.X||!cref.current||!window.Chart)return;
    if(cinst.current){cinst.current.destroy();cinst.current=null;}
    const ds=steps.filter(s=>s.m.length>0).map((s,i)=>({
      label:`G${s.n} Q=${s.q}`,
      data:s.m.map(p=>({x:Math.max(p.t,.1),y:p.s})),
      borderColor:COLORS[i%COLORS.length],backgroundColor:"transparent",borderWidth:2,pointRadius:3,tension:0
    }));
    if(rec.length>0)ds.push({label:`Risalita Q=${recQ}`,data:rec.map(p=>({x:Math.max(p.t,.1),y:p.s})),
      borderColor:"#E24B4A",backgroundColor:"transparent",borderWidth:2,borderDash:[6,3],pointRadius:3,tension:0});
    cinst.current=new Chart(cref.current,{type:"scatter",data:{datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{
          x:{type:"logarithmic",title:{display:true,text:"Tempo [s] — log",font:{size:10},color:"#888"},
             ticks:{color:"#888",callback:v=>v>=1?v.toFixed(1):v.toFixed(2)},grid:{color:"rgba(128,128,128,.1)"}},
          y:{reverse:true,title:{display:true,text:"s [m]",font:{size:10},color:"#888"},
             ticks:{color:"#888"},grid:{color:"rgba(128,128,128,.1)"}}
        },
        plugins:{legend:{display:true,position:"bottom",labels:{font:{size:10},boxWidth:10,color:"#888"}},
          tooltip:{callbacks:{label:c=>`t=${c.raw.x.toFixed(1)}s  s=${c.raw.y.toFixed(3)}m`}}}
      }
    });
    return()=>{if(cinst.current){cinst.current.destroy();cinst.current=null;}};
  },[chartOk,steps,rec,recQ,ph]);

  const save=useCallback((p={})=>{
    DB.save({ph,well,cfg,steps,idx,rec,recQ,tsec,...p});
  },[ph,well,cfg,steps,idx,rec,recQ,tsec]);

  // GPS
  const getGPS=()=>{
    setGL(true);setGE("");
    if(!navigator.geolocation){setGE("GPS non disponibile");setGL(false);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{const{latitude:la,longitude:lo,altitude:al}=pos.coords;
        setWell(w=>({...w,lat:la.toFixed(6),lon:lo.toFixed(6),alt:al?al.toFixed(1):"N/D"}));
        setGL(false);T("Coordinate acquisite","o");},
      ()=>{setGE("Permesso GPS negato");setGL(false);}
    );
  };

  // Start
  const start=()=>{
    if(!well.name.trim()){T("Inserisci nome pozzo","e");return;}
    if(cfg.some(s=>!(parseFloat(s.q)>0))){T("Imposta Q per ogni gradino","e");return;}
    const built=cfg.map(s=>({n:s.n,q:parseFloat(s.q).toFixed(2),m:[]}));
    setSteps(built);setIdx(0);setPh(PH.D);setTsec(0);
    DB.save({ph:PH.D,well,cfg,steps:built,idx:0,rec:[],recQ:0,tsec:0});
    T(`Avviata — ${built.length} gradini`,"o");
  };

  // Record measure
  const recM=useCallback(()=>{
    const v=parseFloat(sv.replace(",","."));
    if(!(v>=0)){T("Valore s non valido","e");return;}
    const p={ts:new Date().toISOString(),t:parseFloat((tsec/60).toFixed(3)),s:v};
    const up=steps.map((s,i)=>i===idx?{...s,m:[...s.m,p]}:s);
    setSteps(up);setSv("");
    setTimeout(()=>sinp.current&&sinp.current.focus(),50);
    save({steps:up});T(`s=${v.toFixed(3)} m @ ${tsec}s`,"o");
  },[sv,tsec,steps,idx,save]);

  const nextStep=()=>{
    const ni=idx+1;
    if(ni>=steps.length){T("Tutti i gradini completati","o");return;}
    setIdx(ni);setTrun(false);
    save({idx:ni});T(`Gradino ${steps[ni].n}`);
  };

  const startRec=()=>{
    const lq=parseFloat(steps[steps.length-1].q);
    setPh(PH.R);setRecQ(lq);setTsec(0);setTrun(false);setRec([]);
    save({ph:PH.R,recQ:lq,tsec:0,rec:[]});T("Spegnere la pompa e avviare il timer","o");
  };

  const recR=()=>{
    const v=parseFloat(rv.replace(",","."));
    if(!(v>=0)){T("Valore s' non valido","e");return;}
    const p={ts:new Date().toISOString(),t:parseFloat((tsec/60).toFixed(3)),s:v};
    const up=[...rec,p];setRec(up);setRv("");
    save({rec:up});T(`s'=${v.toFixed(3)} m @ ${tsec}s`,"o");
  };

  const finish=()=>{setPh(PH.X);setTrun(false);setChartOk(false);save({ph:PH.X});};

  const exportCSV=async()=>{
    let c=`# PROVE DI PORTATA\n`;
    c+=`# Pozzo,${well.name}\n`;
    c+=`# Livello_statico_m,${well.ls||""}\n`;
    c+=`# Lat,${well.lat||""}\n`;
    c+=`# Lon,${well.lon||""}\n`;
    c+=`# Alt_m,${well.alt||""}\n`;
    c+=`# Esportato,${new Date().toISOString()}\n`;
    c+=`\nFASE,GRADINO,Q_m3h,TIMESTAMP,TEMPO_min,ABBASSAMENTO_m\n`;
    steps.forEach(s=>s.m.forEach(p=>{
      c+=`ABBASSAMENTO,${s.n},${s.q},${p.ts},${Number(p.t).toFixed(3)},${Number(p.s).toFixed(3)}\n`;
    }));
    rec.forEach(p=>{
      c+=`RISALITA,,${recQ},${p.ts},${Number(p.t).toFixed(3)},${Number(p.s).toFixed(3)}\n`;
    });
    const fname=`portata_${well.name.replace(/\s+/g,"_")}_${Date.now()}.csv`;
    // 1) prova Web Share API con file
    try{
      const file=new File([c],fname,{type:"text/plain"});
      if(navigator.share&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:`Portata — ${well.name}`});
        return;
      }
    }catch(e){if(e.name==="AbortError")return;}
    // 2) fallback: mostra modal con contenuto copiabile + link download
    setCsvModal({text:c,fname});
  };

  const newSession=()=>{
    DB.clear();setPh(PH.S);setWell({name:"",lat:"",lon:"",alt:""});
    setCfg([{n:1,q:""},{n:2,q:""},{n:3,q:""}]);setSteps([]);setIdx(0);setRec([]);
    setTsec(0);setTrun(false);setRestored(false);setChartOk(false);
  };

  const cur=steps[idx];
  const isLast=idx>=steps.length-1;
  const phases=[PH.S,PH.D,PH.R,PH.X];
  const phN=phases.indexOf(ph);
  const phLabel={[PH.S]:"1. Configurazione",[PH.D]:"2. Abbassamento",[PH.R]:"3. Risalita",[PH.X]:"4. Risultati"};

  return html`<div>
    ${toast&&html`<div className=${"notif "+{i:"ni",o:"no",e:"ne"}[toast.t]}>${toast.msg}</div>`}
    ${restored&&html`<div className="notif" style=${{background:"var(--amb)",color:"var(--ambt)",borderBottom:".5px solid #fac775",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>Sessione ripristinata: <strong>${well.name}</strong></span>
      <button onClick=${()=>setRestored(false)} style=${{background:"none",border:"none",fontSize:22,padding:0,lineHeight:1,color:"var(--ambt)"}}>×</button>
    </div>`}

    <div style=${{padding:"16px 16px 0"}}>
      <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style=${{fontSize:13,fontWeight:500}}>PROVE DI PORTATA</span>
        ${well.name&&html`<span style=${{fontSize:12,color:"var(--text2)"}}> — ${well.name}</span>`}
      </div>
      <div className="pbar">${phases.map((_,i)=>html`<div style=${{background:phN>=i?"var(--blue)":"var(--border)"}}></div>`)}</div>
      <p style=${{fontSize:11,color:"var(--text2)",marginBottom:14,textTransform:"uppercase",letterSpacing:".05em"}}>${phLabel[ph]}</p>
    </div>

    ${ph===PH.S&&html`<div style=${{padding:"0 16px"}}>
      <${Card}>
        <${Lbl}>Nome pozzo *<//>
        <input type="text" value=${well.name} onInput=${e=>setWell(w=>({...w,name:e.target.value}))} placeholder="es. Pozzo P1"/>
      <//>
      <${Card}>
        <${Lbl}>Livello statico falda [m da p.c.]<//>
        <input type="text" inputMode="decimal" pattern="[0-9.]*" value=${well.ls} onInput=${e=>setWell(w=>({...w,ls:e.target.value}))} placeholder="es. 5.40"/>
      <//>
      <${Card}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <${Lbl}>Coordinate GPS<//>
          <button onClick=${getGPS} disabled=${gL} style=${{fontSize:12,padding:"4px 12px"}}>${gL?"Acquisizione...":"Acquisisci GPS"}</button>
        </div>
        ${gE&&html`<p style=${{color:"var(--red)",fontSize:12,marginBottom:8}}>${gE}</p>`}
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          ${["lat","lon","alt"].map(k=>html`<div key=${k}>
            <${Lbl}>${k==="lat"?"Lat":k==="lon"?"Lon":"Quota m"}<//>
            <input type="number" inputMode="decimal" value=${well[k]} onInput=${e=>setWell(w=>({...w,[k]:e.target.value}))} placeholder=${k==="alt"?"m":"°"} style=${{fontSize:13}}/>
          </div>`)}
        </div>
      <//>
      <${Card}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          ${csvModal&&html`<div className="modal-bg" onClick=${e=>{if(e.target.className==="modal-bg")setCsvModal(null)}}>
      <div className="modal">
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style=${{fontWeight:500,fontSize:14}}>Dati CSV — ${csvModal.fname}</span>
          <button onClick=${()=>setCsvModal(null)} style=${{background:"none",border:"none",fontSize:22,padding:0,lineHeight:1}}>×</button>
        </div>
        <p style=${{fontSize:12,color:"var(--text2)"}}>Copia il testo qui sotto e incollalo in una email, o usa il pulsante Scarica.</p>
        <textarea readOnly value=${csvModal.text} onClick=${e=>e.target.select()}></textarea>
        <div style=${{display:"flex",gap:8}}>
          <button className="bp" onClick=${()=>{
            navigator.clipboard&&navigator.clipboard.writeText(csvModal.text).then(()=>T("Copiato negli appunti","o"));
          }} style=${{flex:1,padding:10,fontSize:13,fontWeight:500}}>Copia testo</button>
          <button className="bg" onClick=${()=>{
            const a=document.createElement("a");
            a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(csvModal.text);
            a.download=csvModal.fname;a.click();T("File scaricato","o");
          }} style=${{flex:1,padding:10,fontSize:13,fontWeight:500}}>Scarica file</button>
        </div>
      </div>
    </div>`}
    <div>
            <${Lbl}>Portate gradini<//>
            <p style=${{fontSize:12,color:"var(--text2)",marginTop:2}}>Imposta Q [m³/h] prima di avviare</p>
          </div>
          <div style=${{display:"flex",gap:6}}>
            <button onClick=${()=>{if(cfg.length>3)setCfg(c=>c.slice(0,-1))}} disabled=${cfg.length<=3} style=${{fontSize:20,lineHeight:1,padding:"2px 10px"}}>−</button>
            <button onClick=${()=>setCfg(c=>[...c,{n:c.length+1,q:""}])} style=${{fontSize:20,lineHeight:1,padding:"2px 10px"}}>+</button>
          </div>
        </div>
        ${cfg.map((s,i)=>html`<div key=${i} style=${{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style=${{width:28,height:28,borderRadius:"50%",background:COLORS[i%COLORS.length],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style=${{fontSize:12,fontWeight:500,color:"#fff"}}>${s.n}</span>
          </div>
          <div style=${{flex:1}}>
            <${Lbl}>Gradino ${s.n} — Q [m³/h]<//>
            <input type="number" inputMode="decimal" value=${s.q} onInput=${e=>setCfg(c=>c.map((x,j)=>j===i?{...x,q:e.target.value}:x))} placeholder="es. 12.5" min="0" step="0.1"/>
          </div>
          ${parseFloat(s.q)>0&&html`<span style=${{fontSize:18,color:"var(--green)"}}>✓</span>`}
        </div>`)}
        <p style=${{fontSize:11,color:"var(--text2)",marginTop:4}}>Min. 3 gradini richiesti</p>
      <//>
      <button className="bp" onClick=${start} style=${{width:"100%",padding:14,fontSize:15,borderRadius:"var(--r)"}}>Avvia prova</button>
    </div>`}

    ${ph===PH.D&&cur&&html`<div style=${{padding:"0 16px"}}>
      <div className="snav">
        ${steps.map((s,i)=>html`<div key=${i} className="sp" style=${{
          background:i===idx?"var(--blue)":s.m.length>0?"#eaf3de":"var(--bg2)",
          color:i===idx?"#fff":s.m.length>0?"var(--green)":"var(--text2)",
          border:`.5px solid ${i===idx?"var(--blue)":s.m.length>0?"#c0dd97":"var(--border)"}`}}>
          G${s.n} — ${s.q} m³/h ${s.m.length>0?`(${s.m.length})`:""}
        </div>`)}
      </div>
      <div className="g3">
        <${MC} label="Gradino" value=${`${idx+1}/${steps.length}`}/>
        <${MC} label="Misure tot" value=${steps.reduce((a,s)=>a+s.m.length,0)}/>
        <${MC} label="Q [m³/h]" value=${cur.q}/>
      </div>
      <${Card} style=${{border:".5px solid var(--border2)"}}>
        <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <div style=${{flex:1}}>
            <${Lbl}>Timer gradino ${cur.n} — registra in minuti<//>
            <span className="timer" style=${{color:trun?"var(--green)":"var(--text)"}}>${fmt(tsec)}</span>
          </div>
          <button onClick=${()=>setTrun(a=>!a)} style=${{padding:"10px 22px",fontWeight:500,border:"none",background:trun?"#fcebeb":"#eaf3de",color:trun?"#a32d2d":"#3b6d11"}}>${trun?"Pausa":"Avvia"}</button>
        </div>
        <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
          <div style=${{flex:1}}>
            <${Lbl}>Abbassamento s [m]${trun?html` <span style=${{color:"var(--green)",fontSize:10}}>● live</span>`:""}  <//>
            <input type="text" inputMode="decimal" pattern="[0-9.]*" value=${sv}
              onInput=${e=>setSv(e.target.value)}
              onKeyDown=${e=>{if(e.key==="Enter"){e.preventDefault();recM();}}}
              placeholder="0.000" style=${{fontSize:20,fontWeight:500}}/>
          </div>
          <button className="bp" onClick=${recM} style=${{padding:"10px 18px",fontSize:14,fontWeight:500,flexShrink:0}}>+ Misura</button>
        </div>
        <p style=${{fontSize:11,color:"var(--text2)",marginTop:6}}>Invio o "+ Misura" — timer non si ferma</p>
      <//>
      ${cur.m.length>0&&html`
        <div className="g2">
          <div className="mc">
            <span className="lbl">Ultima s</span>
            <div className="mv">${Number(cur.m[cur.m.length-1].s).toFixed(3)} m</div>
            <div style=${{fontSize:11,color:"var(--text2)",marginTop:2}}>@ t = ${cur.m[cur.m.length-1].t} s</div>
          </div>
          <${MC} label=${`Misure G${cur.n}`} value=${cur.m.length}/>
        </div>
        <${Card}>
          <${Lbl}>Log gradino ${cur.n} (ultime 5)<//>
          <table><thead><tr><th>t [min]</th><th style=${{textAlign:"right"}}>s [m]</th><th style=${{textAlign:"right"}}>Ora</th></tr></thead>
          <tbody>${[...cur.m].reverse().slice(0,5).map((p,i)=>html`<tr key=${i}>
            <td>${p.t.toFixed(3)}</td>
            <td style=${{textAlign:"right",fontWeight:500}}>${Number(p.s).toFixed(3)}</td>
            <td style=${{textAlign:"right",color:"var(--text2)"}}>${new Date(p.ts).toLocaleTimeString("it-IT")}</td>
          </tr>`)}</tbody></table>
          ${cur.m.length>5&&html`<p style=${{fontSize:11,color:"var(--text2)",marginTop:4}}>e altre ${cur.m.length-5} precedenti</p>`}
        <//>
      `}
      <div style=${{display:"flex",gap:8}}>
        ${!isLast&&html`<button onClick=${nextStep} style=${{flex:1,padding:11,fontSize:14,fontWeight:500}}>Gradino ${idx+2} →</button>`}
        <button className="bg" onClick=${startRec} style=${{flex:1,padding:11,fontSize:14}}>
          ${isLast?"Avvia risalita":`Risalita (ancora ${steps.length-1-idx})`}
        </button>
      </div>
      ${isLast&&html`<button onClick=${finish} style=${{width:"100%",marginTop:8,padding:10,fontSize:13,color:"var(--text2)"}}>
        Salta risalita — vai ai risultati
      </button>`}
    </div>`}

    ${ph===PH.R&&html`<div style=${{padding:"0 16px"}}>
      <div className="wb">Spegnere la pompa e avviare il timer.<br/>Q_n = <strong>${recQ} m³/h</strong></div>
      <${Card} style=${{border:".5px solid var(--border2)"}}>
        <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <div style=${{flex:1}}>
            <${Lbl}>Timer risalita<//>
            <span className="timer" style=${{color:trun?"var(--orange)":"var(--text)"}}>${fmt(tsec)}</span>
          </div>
          <button onClick=${()=>setTrun(a=>!a)} style=${{padding:"10px 22px",fontWeight:500,border:"none",background:trun?"#fcebeb":"var(--amb)",color:trun?"#a32d2d":"var(--ambt)"}}>${trun?"Pausa":"Avvia"}</button>
        </div>
        <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
          <div style=${{flex:1}}>
            <${Lbl}>Abbassamento residuo s' [m]<//>
            <input type="text" inputMode="decimal" pattern="[0-9.]*" value=${rv}
              onInput=${e=>setRv(e.target.value)}
              onKeyDown=${e=>{if(e.key==="Enter"){e.preventDefault();recR();}}}
              placeholder="0.000" style=${{fontSize:20,fontWeight:500}}/>
          </div>
          <button className="bo" onClick=${recR} style=${{padding:"10px 18px",fontSize:14,fontWeight:500,flexShrink:0}}>+ Risalita</button>
        </div>
        <p style=${{fontSize:11,color:"var(--text2)",marginTop:6}}>Invio o "+ Risalita" — timer non si ferma</p>
      <//>
      ${rec.length>0&&html`
        <div className="g2">
          <${MC} label="Ultima s'" value=${Number(rec[rec.length-1].s).toFixed(3)+" m"}/>
          <${MC} label="Misure risalita" value=${rec.length}/>
        </div>
        <${Card}>
          <${Lbl}>Log risalita (ultime 5)<//>
          <table><thead><tr><th>t [min]</th><th style=${{textAlign:"right"}}>s' [m]</th><th style=${{textAlign:"right"}}>Ora</th></tr></thead>
          <tbody>${[...rec].reverse().slice(0,5).map((p,i)=>html`<tr key=${i}>
            <td>${p.t.toFixed(3)}</td>
            <td style=${{textAlign:"right",fontWeight:500}}>${Number(p.s).toFixed(3)}</td>
            <td style=${{textAlign:"right",color:"var(--text2)"}}>${new Date(p.ts).toLocaleTimeString("it-IT")}</td>
          </tr>`)}</tbody></table>
        <//>
      `}
      <button className="bp" onClick=${finish} disabled=${rec.length===0} style=${{width:"100%",padding:12,fontSize:14,fontWeight:500,borderRadius:"var(--r)"}}>Visualizza risultati</button>
    </div>`}

    ${ph===PH.X&&html`<div style=${{padding:"0 16px"}}>
      <div className="g3">
        <${MC} label="Gradini" value=${steps.length}/>
        <${MC} label="Misure tot" value=${steps.reduce((a,s)=>a+s.m.length,0)+rec.length}/>
        <${MC} label="Stato" value="Completata" color="var(--green)"/>
      </div>
      <${Card}>
        <${Lbl}>Grafico semilogaritmico — s / log t<//>
        <p style=${{fontSize:11,color:"var(--text2)",marginBottom:10}}>X: log(t) — Y: s lineare invertito</p>
        <div style=${{position:"relative",width:"100%",height:300}}>
          <canvas ref=${cref} role="img" aria-label="Grafico prove di portata"></canvas>
        </div>
      <//>
      <${Card}>
        <${Lbl}>Riepilogo<//>
        ${steps.map((s,i)=>html`<div key=${i} style=${{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderTop:i===0?"none":".5px solid var(--border)",fontSize:13}}>
          <span style=${{width:10,height:10,borderRadius:"50%",background:COLORS[i],flexShrink:0,display:"inline-block"}}></span>
          <span>G${s.n}</span><span style=${{color:"var(--text2)"}}>Q=${s.q} m³/h</span>
          <span style=${{marginLeft:"auto",color:"var(--text2)"}}>${s.m.length} mis.</span>
          ${s.m.length>0&&html`<span style=${{fontSize:12,color:"var(--text2)"}}>s_max=${Math.max(...s.m.map(p=>p.s)).toFixed(3)}m</span>`}
        </div>`)}
        ${rec.length>0&&html`<div style=${{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderTop:".5px solid var(--border)",fontSize:13}}>
          <span style=${{width:10,height:10,borderRadius:"50%",background:"#E24B4A",flexShrink:0,display:"inline-block"}}></span>
          <span>Risalita</span><span style=${{color:"var(--text2)"}}>Q_n=${recQ} m³/h</span>
          <span style=${{marginLeft:"auto",color:"var(--text2)"}}>${rec.length} mis.</span>
        </div>`}
      <//>
      <${Card}>
        <${Lbl}>Metadati pozzo<//>
        <table style=${{fontSize:13}}><tbody>
          <tr><td style=${{color:"var(--text2)",paddingRight:16,border:"none"}}>Nome</td><td style=${{fontWeight:500,border:"none"}}>${well.name}</td></tr>
          <tr><td style=${{color:"var(--text2)",border:"none"}}>Livello statico</td><td style=${{border:"none"}}>${well.ls||"—"} m</td></tr>
          <tr><td style=${{color:"var(--text2)",border:"none"}}>Lat / Lon</td><td style=${{border:"none"}}>${well.lat||"—"} / ${well.lon||"—"}</td></tr>
          <tr><td style=${{color:"var(--text2)",border:"none"}}>Quota</td><td style=${{border:"none"}}>${well.alt||"—"} m</td></tr>
        </tbody></table>
      <//>
      <div style=${{display:"flex",gap:8}}>
        <button className="bg" onClick=${exportCSV} style=${{flex:2,padding:12,fontSize:14,fontWeight:500,borderRadius:"var(--r)"}}>Esporta CSV</button>
        <button onClick=${newSession} style=${{flex:1,padding:12,fontSize:14,borderRadius:"var(--r)",color:"var(--text2)"}}>Nuova prova</button>
      </div>
    </div>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
